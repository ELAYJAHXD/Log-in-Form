<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        
        body {
            background: linear-gradient(135deg, #0a192f, #172a45, #3066be, #b4c5e4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* Safari support */
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 30px;
            border-radius: 16px;
            color: #ffffff;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        
        .form-floating > .form-control {
            color: #1d2d44 !important;
            border-radius: 8px;
        }

        .btn-custom-blue {
            background-color: #0077b6;
            border: none;
            color: white;
            transition: background-color 0.2s ease-in-out;
        }

        .btn-custom-blue:hover {
            background-color: #0096c7;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2 class="text-center mb-4 fw-bold">Login</h2>

    <form action="register.html" method="GET">

        <div class="form-floating mb-3">
            <input type="email" name="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput" class="text-secondary">Email Address</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" name="password" class="form-control is-invalid" id="passwordInput" placeholder="Password" value="12345" required>
            <label for="passwordInput" class="text-secondary">Password</label>

            <div class="invalid-feedback text-warning fw-semibold mt-1">
                Invalid password! Please try again.
            </div>
        </div>

        <button type="submit" class="btn btn-custom-blue w-100 btn-lg mt-3 fw-bold shadow-sm">
            Sign In
        </button>

    </form>
</div>

</body>
</html>
