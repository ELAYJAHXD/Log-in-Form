<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      
        body {
            background: linear-gradient(135deg, #0a192f, #172a45, #3066be, #b4c5e4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background-color: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* Safari support */
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 30px;
            border-radius: 16px;
            color: #ffffff;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .form-control, .form-select {
            border-radius: 8px;
        }

        .btn-custom-blue {
            background-color: #0077b6;
            border: none;
            color: white;
            transition: background-color 0.2s ease-in-out;
        }

        .btn-custom-blue:hover {
            background-color: #0096c7;
            color: white;
        }
    </style>
</head>
<body>

<div class="register-card">
    <h2 class="text-center mb-4 fw-bold">Join Our Team</h2>
    
    <form action="applicant-dashboard.html" method="GET">
        
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" name="fullname" class="form-control" placeholder="Deybid Tornado" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Contact Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="0969XXXXXXX" required>
            </div>
        </div>

        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="email" name="applicant_email" class="form-control" placeholder="deybidtornado" required>
                <span class="input-group-text">email.com</span>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Target Department</label>
                <select name="department" class="form-select" required>
                    <option value="" selected disabled>Choose department...</option>
                    <option value="tech">Engineering & IT</option>
                    <option value="marketing">Marketing & Design</option>
                    <option value="sales">Sales & Account Management</option>
                    <option value="innovation">Software Research & Development (R&D)</option>
                    <option value="mitigation">Cyber Security & Information Assurance</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label d-block">Work Preference</label>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="work_type" id="remote" value="remote" checked>
                    <label class="form-check-label" for="remote">Remote</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="work_type" id="onsite" value="onsite">
                    <label class="form-check-label" for="onsite">On-site</label>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create portal password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Retype password" required>
            </div>
        </div>

        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
                I consent to the background verification policy and certify that all submitted credentials are accurate.
            </label>
        </div>

        <button type="submit" class="btn btn-custom-blue w-100 btn-lg fw-bold shadow-sm py-2">Submit Application</button>

    </form>
</div>

</body>
</html>
